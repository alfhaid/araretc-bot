<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أعمار العائلة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Tajawal', 'Segoe UI', Tahoma, Arial, sans-serif;
    background: #0F1A1A;
    margin: 0;
    padding: 18px;
    color: #F2F2EF;
  }
  .container { max-width: 700px; margin: 0 auto; }
  h1 {
    text-align: center;
    font-family: 'Amiri', serif;
    font-size: 30px;
    font-weight: 700;
    color: #2DD4A7;
    margin-bottom: 22px;
  }

  .add-form {
    background: #18282A;
    border: 1px solid #234142;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 22px;
  }
  .form-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .form-row input, .form-row select {
    flex: 1;
    min-width: 100px;
    padding: 12px;
    border: 1px solid #2A4244;
    border-radius: 8px;
    font-size: 16px;
    font-family: inherit;
    background: #0F1A1A;
    color: #F2F2EF;
  }
  .form-row input::placeholder { color: #6b8d8e; }
  .calendar-toggle {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }
  .calendar-toggle button {
    flex: 1;
    padding: 10px;
    border: 1px solid #2A4244;
    background: #0F1A1A;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    color: #9fb8b9;
    font-family: inherit;
  }
  .calendar-toggle button.active {
    background: #2DD4A7;
    color: #0F1A1A;
    border-color: #2DD4A7;
    font-weight: 700;
  }
  .add-form .submit-btn {
    width: 100%;
    background: #2DD4A7;
    color: #0F1A1A;
    border: none;
    padding: 13px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .add-form .submit-btn:hover { background: #25b890; }

  .card {
    background: #18282A;
    border: 1px solid #234142;
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .card .info { display: flex; flex-direction: column; }
  .card .name-row { display: flex; align-items: center; gap: 8px; }
  .card .name {
    font-family: 'Amiri', serif;
    font-size: 22px;
    font-weight: 700;
    color: #F2F2EF;
  }
  .card .me-badge {
    font-size: 12px;
    font-weight: 700;
    background: #2DD4A7;
    color: #0F1A1A;
    padding: 3px 9px;
    border-radius: 10px;
  }
  .card .set-me-btn {
    font-size: 12px;
    background: none;
    border: 1px solid #2A4244;
    color: #9fb8b9;
    padding: 3px 9px;
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
  }
  .card .dob { font-size: 14px; color: #9fb8b9; margin-top: 4px; }
  .card .dob span { display: block; }
  .card .diff-older { color: #2DD4A7; }
  .card .diff-younger { color: #E08A6B; }
  .card .age {
    font-size: 24px;
    font-weight: 800;
    color: #2DD4A7;
    text-align: left;
    font-variant-numeric: normal;
    font-feature-settings: normal;
  }
  .card .age small { font-size: 12px; color: #9fb8b9; display:block; font-weight:400; }
  .delete-btn {
    background: none;
    border: none;
    color: #E08A6B;
    font-size: 18px;
    cursor: pointer;
    margin-right: 12px;
    padding: 4px 8px;
  }
  .row { display: flex; align-items: center; }
  .empty { text-align: center; color: #6b8d8e; margin-top: 40px; font-size: 15px; }
</style>
</head>
<body>
<div class="container">
  <h1>أعمار العائلة</h1>

  <div class="add-form">
    <div class="calendar-toggle">
      <button id="btnHijri" class="active" onclick="setCalendar('hijri')">هجري</button>
      <button id="btnGregorian" onclick="setCalendar('gregorian')">ميلادي</button>
    </div>

    <div class="form-row">
      <input type="text" id="nameInput" placeholder="الاسم">
    </div>

    <div class="form-row" id="dateInputs">
      <select id="dayInput"></select>
      <select id="monthInput"></select>
      <input type="number" id="yearInput" placeholder="السنة" style="max-width:90px;">
    </div>

    <button class="submit-btn" onclick="addMember()">إضافة</button>
  </div>

  <div id="list"></div>
  <div id="emptyMsg" class="empty" style="display:none;">لا يوجد أعضاء بعد. أضف أول عضو بالأعلى.</div>
</div>

<script>
  const STORAGE_KEY = 'family_members_v2';
  let currentCalendar = 'hijri';

  const hijriMonths = ['محرم','صفر','ربيع الأول','ربيع الآخر','جمادى الأولى','جمادى الآخرة','رجب','شعبان','رمضان','شوال','ذو القعدة','ذو الحجة'];
  const gregMonths = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

  // ===== تحويل هجري <-> ميلادي (خوارزمية Kuwaiti Algorithm - معتمدة شائعة الاستخدام) =====

  function hijriToGregorian(hy, hm, hd) {
    const jd = hijriToJD(hy, hm, hd);
    return jdToGregorian(jd);
  }

  function gregorianToHijri(gy, gm, gd) {
    const jd = gregorianToJD(gy, gm, gd);
    return jdToHijri(jd);
  }

  function hijriToJD(year, month, day) {
    return day + Math.ceil(29.5 * (month - 1)) + (year - 1) * 354
      + Math.floor((3 + 11 * year) / 30) + 1948440 - 1;
  }

  function jdToHijri(jd) {
    jd = Math.floor(jd) + 0.5;
    let year = Math.floor((30 * (jd - 1948440) + 10646) / 10631);
    let month = Math.min(12, Math.ceil((jd - (29 + hijriToJD(year, 1, 1))) / 29.5) + 1);
    let day = jd - hijriToJD(year, month, 1) + 1;
    return { year, month, day };
  }

  function gregorianToJD(year, month, day) {
    const a = Math.floor((14 - month) / 12);
    const y = year + 4800 - a;
    const m = month + 12 * a - 3;
    return day + Math.floor((153 * m + 2) / 5) + 365 * y
      + Math.floor(y / 4) - Math.floor(y / 100) + Math.floor(y / 400) - 32045;
  }

  function jdToGregorian(jd) {
    jd = Math.floor(jd);
    const a = jd + 32044;
    const b = Math.floor((4 * a + 3) / 146097);
    const c = a - Math.floor((146097 * b) / 4);
    const d = Math.floor((4 * c + 3) / 1461);
    const e = c - Math.floor((1461 * d) / 4);
    const m = Math.floor((5 * e + 2) / 153);
    const day = e - Math.floor((153 * m + 2) / 5) + 1;
    const month = m + 3 - 12 * Math.floor(m / 10);
    const year = 100 * b + d - 4800 + Math.floor(m / 10);
    return { year, month, day };
  }

  function todayHijri() {
    const now = new Date();
    return gregorianToHijri(now.getFullYear(), now.getMonth() + 1, now.getDate());
  }

  // ===== التخزين =====

  function loadMembers() {
    const data = localStorage.getItem(STORAGE_KEY);
    return data ? JSON.parse(data) : [];
  }
  function saveMembers(members) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(members));
  }

  // كل عضو: { name, calendar: 'hijri'|'gregorian', y, m, d, gregISO } // gregISO = تاريخ ميلادي محسوب موحّد للحساب والترتيب

  // ===== حساب العمر (بالميلادي دائماً، ثم نعرضه بالنظامين) =====

  function calcAgeFromGregorian(gy, gm, gd) {
    const dob = new Date(gy, gm - 1, gd);
    const now = new Date();

    let years = now.getFullYear() - dob.getFullYear();
    let months = now.getMonth() - dob.getMonth();
    let days = now.getDate() - dob.getDate();

    if (days < 0) {
      months -= 1;
      const lastMonth = new Date(now.getFullYear(), now.getMonth(), 0);
      days += lastMonth.getDate();
    }
    if (months < 0) {
      years -= 1;
      months += 12;
    }
    return { years, months, days };
  }

  function calcHijriAge(birthH) {
    const todayH = todayHijri();
    let years = todayH.year - birthH.year;
    let months = todayH.month - birthH.month;
    let days = todayH.day - birthH.day;
    if (days < 0) { months -= 1; days += 29; }
    if (months < 0) { years -= 1; months += 12; }
    return { years, months, days };
  }

  // حساب السن الهجري لأي عضو بناءً على تاريخ ميلاده الميلادي الموحّد (gregISO)
  function calcHijriAgeFromGregISO(gregISO) {
    const [gy, gm, gd] = gregISO.split('-').map(Number);
    const birthH = gregorianToHijri(gy, gm, gd);
    return calcHijriAge(birthH);
  }

  // ===== واجهة اختيار التقويم =====

  function setCalendar(cal) {
    currentCalendar = cal;
    document.getElementById('btnHijri').classList.toggle('active', cal === 'hijri');
    document.getElementById('btnGregorian').classList.toggle('active', cal === 'gregorian');
    populateDateSelectors();
  }

  function populateDateSelectors() {
    const daySel = document.getElementById('dayInput');
    const monthSel = document.getElementById('monthInput');
    daySel.innerHTML = '';
    monthSel.innerHTML = '';

    for (let d = 1; d <= 31; d++) {
      const opt = document.createElement('option');
      opt.value = d; opt.textContent = d;
      daySel.appendChild(opt);
    }
    const months = currentCalendar === 'hijri' ? hijriMonths : gregMonths;
    months.forEach((name, i) => {
      const opt = document.createElement('option');
      opt.value = i + 1; opt.textContent = name;
      monthSel.appendChild(opt);
    });
  }

  // ===== عرض القائمة =====

  function formatDateDisplay(member) {
    const months = member.calendar === 'hijri' ? hijriMonths : gregMonths;
    const label = member.calendar === 'hijri' ? 'هـ' : 'م';
    return `${member.d} ${months[member.m - 1]} ${member.y} ${label}`;
  }

  // الفرق بالسنوات والشهور بين تاريخين ميلاديين (gregISO)، موجب = الأول أكبر
  function diffYearsMonths(refISO, targetISO) {
    const [ry, rm, rd] = refISO.split('-').map(Number);
    const [ty, tm, td] = targetISO.split('-').map(Number);
    const ref = new Date(ry, rm - 1, rd);
    const target = new Date(ty, tm - 1, td);

    // الفرق: target بالنسبة لـ ref. إذا target أصغر (تاريخ ميلاد لاحق) فهو أصغر سناً.
    let years, months;
    const refIsOlder = ref <= target; // ref تاريخ ميلاده أبكر أو نفس التاريخ => ref أكبر سناً

    const a = refIsOlder ? ref : target;
    const b = refIsOlder ? target : ref;

    years = b.getFullYear() - a.getFullYear();
    months = b.getMonth() - a.getMonth();
    let days = b.getDate() - a.getDate();
    if (days < 0) {
      months -= 1;
    }
    if (months < 0) {
      years -= 1;
      months += 12;
    }
    return { years, months, targetIsYounger: refIsOlder };
  }

  function render() {
    const members = loadMembers();
    const list = document.getElementById('list');
    const emptyMsg = document.getElementById('emptyMsg');
    list.innerHTML = '';

    if (members.length === 0) {
      emptyMsg.style.display = 'block';
      return;
    }
    emptyMsg.style.display = 'none';

    members.sort((a, b) => new Date(a.gregISO) - new Date(b.gregISO));
    const meIndex = members.findIndex(m => m.isMe);
    const me = meIndex >= 0 ? members[meIndex] : null;

    members.forEach((m, index) => {
      const [gy, gm, gd] = m.gregISO.split('-').map(Number);
      const ageG = calcAgeFromGregorian(gy, gm, gd);
      const ageH = calcHijriAgeFromGregISO(m.gregISO);
      const birthH = gregorianToHijri(gy, gm, gd);

      const ageDisplay = `${birthH.year}هـ : ${ageH.years} سنة`;
      const ageSubNote = `${gy}م : ${ageG.years} سنة`;

      let smallNote;

      if (m.isMe) {
        smallNote = `<span style="color:#2DD4A7;">المرجع (أنا)</span>`;
      } else if (me) {
        const diff = diffYearsMonths(me.gregISO, m.gregISO);
        const cls = diff.targetIsYounger ? 'diff-younger' : 'diff-older';
        const word = diff.targetIsYounger ? 'أصغر' : 'أكبر';
        const parts = [];
        if (diff.years > 0) parts.push(`${diff.years} سنة`);
        if (diff.months > 0) parts.push(`${diff.months} شهر`);
        const diffText = parts.length ? parts.join(' و') : 'أقل من شهر';
        smallNote = `<span class="${cls}">${word} منك بـ ${diffText}</span>`;
      } else {
        smallNote = `<span style="color:#6b8d8e;">حدد المرجع "أنا" لعرض الفرق</span>`;
      }

      const meBadgeOrBtn = m.isMe
        ? `<span class="me-badge">أنا</span>`
        : `<button class="set-me-btn" onclick="setAsMe(${index})">أنا</button>`;

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="row">
          <button class="delete-btn" onclick="deleteMember(${index})">✕</button>
          <div class="info">
            <div class="name-row">
              <span class="name">${m.name}</span>
              ${meBadgeOrBtn}
            </div>
            <span class="dob">${smallNote}</span>
          </div>
        </div>
        <div class="age">${ageDisplay}<small>${ageSubNote}</small></div>
      `;
      list.appendChild(card);
    });
  }

  function setAsMe(index) {
    const members = loadMembers();
    members.sort((a, b) => new Date(a.gregISO) - new Date(b.gregISO));
    members.forEach((m, i) => { m.isMe = (i === index); });
    saveMembers(members);
    render();
  }

  // ===== الرمز السري للإضافة والحذف =====
  // غيّر هذا الرقم لأي رمز تبيه
  const PIN_CODE = 'fhd';

  function checkPin() {
    const entered = prompt('أدخل الرمز السري للتعديل:');
    if (entered === null) return false; // ضغط إلغاء
    if (entered !== PIN_CODE) {
      alert('رمز غير صحيح');
      return false;
    }
    return true;
  }

  // ===== إضافة وحذف =====

  function addMember() {
    if (!checkPin()) return;

    const nameInput = document.getElementById('nameInput');
    const name = nameInput.value.trim();
    const d = parseInt(document.getElementById('dayInput').value);
    const m = parseInt(document.getElementById('monthInput').value);
    const y = parseInt(document.getElementById('yearInput').value);

    if (!name || !d || !m || !y) {
      alert('أدخل الاسم والتاريخ كاملاً');
      return;
    }

    let gregISO;
    if (currentCalendar === 'hijri') {
      const g = hijriToGregorian(y, m, d);
      gregISO = `${g.year}-${String(g.month).padStart(2,'0')}-${String(g.day).padStart(2,'0')}`;
    } else {
      gregISO = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    }

    const members = loadMembers();
    members.push({ name, calendar: currentCalendar, y, m, d, gregISO });
    saveMembers(members);

    nameInput.value = '';
    document.getElementById('yearInput').value = '';
    render();
  }

  function deleteMember(index) {
    if (!checkPin()) return;

    const members = loadMembers();
    members.sort((a, b) => new Date(a.gregISO) - new Date(b.gregISO));
    members.splice(index, 1);
    saveMembers(members);
    render();
  }

  // ===== تهيئة =====
  populateDateSelectors();
  render();
</script>
</body>
</html>
